name: Update DWG Prognostic Chart

on:
  schedule:
    - cron: '0 22 */2 * *'
  workflow_dispatch:

jobs:
  generate-chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests anthropic
      - name: Generate chart
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_chart.py
      - run: |
          git config user.name "DWG Weather Bot"
          git config user.email "bot@dwg-weather.local"
          git add dwg_prog_discussion_chart.html
          git diff --staged --quiet || git commit -m "Auto-update chart $(date +'%b %d %Y')"
          git push
