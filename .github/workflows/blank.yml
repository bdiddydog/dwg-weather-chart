name: Update DWG Prognostic Chart

on:
  schedule:
    - cron: '0 22 */2 * *'
  workflow_dispatch:

jobs:
  generate-chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install anthropic

      - name: Fetch CPC discussion and generate chart
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - << 'PYEOF'
          import urllib.request, os, sys, anthropic

          # ── Fetch CPC discussion ──────────────────────────────────────────
          HEADERS = {"User-Agent": "DWG-Weather-Chart/1.0 (Delaware Weather Group)"}
          URLS = [
              "https://tgftp.nws.noaa.gov/data/raw/fx/fxus06.kwbc.pmd.mrd.txt",
              "https://tgftp.nws.noaa.gov/data/forecasts/pmd/fxus06.txt",
          ]

          text = ""
          for url in URLS:
              try:
                  print(f"Trying {url}")
                  req = urllib.request.Request(url, headers=HEADERS)
                  with urllib.request.urlopen(req, timeout=20) as r:
                      text = r.read().decode("utf-8", errors="ignore").strip()
                  if len(text) > 500 and ("6-10" in text or "6 to 10" in text.lower()):
                      print(f"  Got {len(text)} chars OK")
                      break
                  else:
                      text = ""
              except Exception as e:
                  print(f"  Failed: {e}")

          if not text:
              print("ERROR: Could not fetch CPC discussion", file=sys.stderr)
              sys.exit(1)

          # ── Call Claude to generate chart ─────────────────────────────────
          SYSTEM = """You are a weather data visualization expert for the Delaware Weather Group (DWG).
          Convert a raw NWS CPC 6-10/8-14 day prognostic discussion into a polished dark-themed HTML dashboard.

          DESIGN: Dark control-room. CSS vars: --bg:#050c18 --panel:#070f1e --border:#0e2844 --text:#cce4f8
          --b:#00c8ff --g:#00ff9d --a:#ffb700 --p:#b060ff --w:#fff5e0 --warm:#ff7d3b --cool:#5bc8ff --wet:#38d47a --dry:#c8941a --dim:#2e4d6a
          Fonts (Google): Orbitron headers, Share Tech Mono data, Barlow body.
          Scanline body::before, grid body::after, fadeUp animations.

          SECTIONS:
          1. MASTHEAD - 🌩 cyan logo, DWG Virtual Weather Lab, issued time, forecaster, valid dates
          2. CONFIDENCE - Two cards, dot-pip gauges /5, 6-10 blue, 8-14 amber, score+reason
          3. DIVIDER - cyan pill "6-10 DAY OUTLOOK [dates]"
          4. PATTERN OVERVIEW 6-10 - 3-col cards, ridge=warm border, trough=cool, neutral=green, anomaly values
          5. KEY HIGHLIGHTS 6-10 - 4 big-number hot/cold/wet/dry cards, region+%+reason
          6. TEMP+PRECIP BARS 6-10 - side-by-side panels, horizontal bars, width=probability%
          7. MODEL BLEND 6-10 - bar chart, CNENS=green ECENS=purple GEFS=cyan ECMWF=amber GFS=orange, exact %
          8. DIVIDER - purple pill "8-14 DAY OUTLOOK [dates]"
          9. PATTERN EVOLUTION 8-14 - 3-col cards, changes from wk1, directional emojis, model disagreements
          10. KEY HIGHLIGHTS 8-14 - same as 5 for wk2
          11. TEMP+PRECIP BARS 8-14 - same as 6 for wk2
          12. MODEL BLEND 8-14 - same as 7 for wk2
          13. STATE TABLE - State|6-10T|6-10P|8-14T|8-14P|Note, exact A/N/B from tables,
              DELAWARE ⭐ cyan, include MD NJ PA NY VA WV OH CT RI, colored badge tags
          14. ANALOGS - two cards, 5-day D-3 and 7-day D-4 dates as "Mon DD YYYY"
          15. FOOTER - DWG left, normals+source right

          OUTPUT: Full HTML only. No markdown. Start with <!DOCTYPE html>."""

          client = anthropic.Anthropic(api_key=os.environ["ANTHROPIC_API_KEY"])
          msg = client.messages.create(
              model="claude-sonnet-4-20250514",
              max_tokens=16000,
              system=SYSTEM,
              messages=[{"role":"user","content":f"Generate the DWG chart HTML:\n\n{text}"}]
          )
          html = msg.content[0].text.strip()
          if html.startswith("```"):
              html = html.split("\n",1)[1]
              if "```" in html:
                  html = html.rsplit("```",1)[0]

          with open("dwg_prog_discussion_chart.html","w",encoding="utf-8") as f:
              f.write(html)
          print(f"Chart saved — {len(html)} chars")
          PYEOF

      - name: Commit and push chart
        run: |
          git config user.name  "DWG Weather Bot"
          git config user.email "bot@dwg-weather.local"
          git add dwg_prog_discussion_chart.html
          git diff --staged --quiet || git commit -m "Auto-update chart $(date +'%b %d %Y')"
          git push
